# aws-credentials secret must exist in the external-secrets namespace.
# To recreate it after loss (e.g. namespace force-delete during cluster recovery):
#
#   aws iam delete-access-key --access-key-id <OLD_KEY_ID>  # if exposed
#   aws iam create-access-key | jq -r '
#     "apiVersion: v1\nkind: Secret\nmetadata:\n  name: aws-credentials\n  namespace: external-secrets\ntype: Opaque\nstringData:\n  access-key-id: " + .AccessKey.AccessKeyId + "\n  secret-access-key: " + .AccessKey.SecretAccessKey
#   ' | kubectl apply -f -
#
# IAM user: dgunzy (arn:aws:iam::027533315109:user/dgunzy)
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: ca-central-1
      auth:
        secretRef:
          accessKeyIDSecretRef:
            name: aws-credentials
            namespace: external-secrets
            key: access-key-id
          secretAccessKeySecretRef:
            name: aws-credentials
            namespace: external-secrets
            key: secret-access-key
