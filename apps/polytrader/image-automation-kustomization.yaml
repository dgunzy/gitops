apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: polytrader-image-automation
  namespace: flux-system
spec:
  interval: 5m
  path: ./flux-image-automation
  prune: true
  sourceRef:
    kind: GitRepository
    name: polytrader
  wait: true
  timeout: 5m
  dependsOn:
    - name: polytrader
