# Pulls the SSH deploy key from AWS Secrets Manager so Flux can clone the private repo.
# Store the key in AWS SM at: k0s/polytrader/deploy-key
# with fields: identity (private key), identity.pub (public key), known_hosts
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: polytrader-deploy-key
  namespace: flux-system
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: polytrader-deploy-key
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: k0s/polytrader/deploy-key
