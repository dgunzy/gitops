# Flux Kustomization that reconciles the k8s/ directory from the private poly-trader repo
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: polytrader
  namespace: flux-system
spec:
  interval: 5m
  path: ./k8s
  prune: true
  sourceRef:
    kind: GitRepository
    name: polytrader
  wait: true
  timeout: 5m
