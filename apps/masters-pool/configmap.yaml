apiVersion: v1
kind: ConfigMap
metadata:
  name: masters-pool-data
  namespace: masters-pool
data:
  # ── Pool entries CSV ────────────────────────────────────────────────────────
  # Replace the placeholder rows below with real participant picks.
  #
  # HOW TO FORMAT:
  #   - First row: "Entry" then one column per participant (their name)
  #   - Each subsequent row: group label, then each person's pick for that group
  #   - Use lastName only (e.g. "Scheffler") — case insensitive
  #   - EXCEPTIONS — must use full name to avoid collisions:
  #       Si Woo Kim   (not just "Kim")
  #       Zach Johnson (not just "Johnson" — Dustin Johnson also in field)
  #       Haotong Li   (not just "Li" — "li" substring-matches other names)
  #
  # 2026 GROUPS (for reference when filling in picks):
  #   Group 1:     DeChambeau | McIlroy | Rahm | Scheffler
  #   Group 2:     Åberg | Fleetwood | Schauffele | Young
  #   Group 3:     Fitzpatrick | Morikawa | Reed | Rose
  #   Group 4:     Koepka | Lee | Matsuyama | Spieth
  #   Group 5:     Bhatia | Gotterup | Hovland | MacIntyre
  #   Group 6:     Henley | Si Woo Kim | Knapp | Straka
  #   Group 7:     Bridgeman | Day | Lowry | Thomas
  #   Group 8:     Cantlay | Conners | Scott | Woodland
  #   Group 9 (M): Haotong Li | Novak | Ortiz | Potgieter   ← payout DOUBLES
  #   Group 10 (OM): Cabrera | Zach Johnson | Schwartzel | Willett  ← payout TRIPLES
  #   WC:  anyone NOT listed above
  #   1RL: anyone in the field
  #
  entries.csv: |
    Entry,PARTICIPANT1,PARTICIPANT2
    Group 1,Scheffler,McIlroy
    Group 2,Åberg,Schauffele
    Group 3,Rose,Morikawa
    Group 4,Matsuyama,Koepka
    Group 5,Hovland,Bhatia
    Group 6,Straka,Si Woo Kim
    Group 7,Thomas,Lowry
    Group 8,Cantlay,Scott
    Group 9 (M),Haotong Li,Novak
    Group 10 (OM),Willett,Zach Johnson
    WC,Burns,Theegala
    1RL,Scheffler,McIlroy

